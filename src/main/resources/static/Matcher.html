<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VGCare Specialist Matcher</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
      padding: 24px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #0f766e;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #0f766e;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #115e59;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #475569;
    }

    .status.error {
      color: #dc2626;
    }

    .status.success {
      color: #15803d;
    }

    .results {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }

    .card {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      background: #fafafa;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      color: #334155;
    }

    .row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .row:last-child {
      border-bottom: none;
    }

    .label {
      font-weight: bold;
      color: #374151;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VGCare Specialist Matcher</h1>
    <p>Enter a natural-language request and the backend will return ranked specialists.</p>

    <form id="matchForm">
      <textarea id="prompt" placeholder="Example: I need a doctor for chemotherapy with budget 1500"></textarea>
      <button type="submit">Find Specialists</button>
    </form>

    <div id="status" class="status"></div>
    <div id="results" class="results"></div>
  </div>

  <script>
    const form = document.getElementById("matchForm");
    const promptInput = document.getElementById("prompt");
    const statusDiv = document.getElementById("status");
    const resultsDiv = document.getElementById("results");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const prompt = promptInput.value.trim();
      if (!prompt) {
        showStatus("Please enter a prompt.", "error");
        return;
      }

      showStatus("Searching specialists...", "loading");

      try {
        const response = await fetch("/match?prompt=" + encodeURIComponent(prompt));
        if (!response.ok) {
          throw new Error("Request failed with status " + response.status);
        }

        const data = await response.json();
        renderResults(data);
        showStatus("Done. " + (Array.isArray(data) ? data.length : 0) + " result(s).", "success");
      } catch (err) {
        showStatus("Error: " + err.message, "error");
      }
    });

    function renderResults(data) {
      resultsDiv.innerHTML = "";

      if (!Array.isArray(data) || data.length === 0) {
        resultsDiv.innerHTML = "<div class='card'>No results found.</div>";
        return;
      }

      data.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("h3");
        title.textContent = "Result " + (index + 1);
        card.appendChild(title);

        const entries = Object.entries(item || {});
        if (entries.length === 0) {
          const p = document.createElement("p");
          p.textContent = "No details available.";
          card.appendChild(p);
        } else {
          entries.forEach(([key, value]) => {
            const row = document.createElement("div");
            row.className = "row";

            const label = document.createElement("div");
            label.className = "label";
            label.textContent = key;

            const val = document.createElement("div");
            val.innerHTML = formatValue(value);

            row.appendChild(label);
            row.appendChild(val);
            card.appendChild(row);
          });
        }

        resultsDiv.appendChild(card);
      });
    }

    function formatValue(value) {
      if (value === null || value === undefined) {
        return "—";
      }

      if (typeof value === "object") {
        return "<pre>" + escapeHtml(JSON.stringify(value, null, 2)) + "</pre>";
      }

      return escapeHtml(String(value));
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = "status";
      if (type === "error") {
        statusDiv.classList.add("error");
      } else if (type === "success") {
        statusDiv.classList.add("success");
      }
    }
  </script>
</body>
</html>
