<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat UI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 24px;
      color: #1f2937;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #0f766e;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #0f766e;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #115e59;
    }

    .status {
      margin-top: 12px;
      color: #475569;
      font-size: 14px;
    }

    .answer {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fafafa;
      white-space: pre-wrap;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simple Chat UI</h1>
    <p>Ask anything to your Spring AI backend.</p>

    <form id="chatForm">
      <textarea id="message" placeholder="Type your message here"></textarea>
      <button type="submit">Send</button>
    </form>

    <div id="status" class="status"></div>
    <div id="answer" class="answer">Answer will appear here.</div>
  </div>

  <script>
    const form = document.getElementById("chatForm");
    const messageInput = document.getElementById("message");
    const statusDiv = document.getElementById("status");
    const answerDiv = document.getElementById("answer");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = messageInput.value.trim();
      if (!message) {
        statusDiv.textContent = "Please enter a message.";
        return;
      }

      statusDiv.textContent = "Thinking...";
      answerDiv.textContent = "";

      try {
        const response = await fetch("/chat?message=" + encodeURIComponent(message));
        if (!response.ok) {
          throw new Error("Request failed with status " + response.status);
        }

        const text = await response.text();
        answerDiv.textContent = text;
        statusDiv.textContent = "Done.";
      } catch (err) {
        statusDiv.textContent = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
